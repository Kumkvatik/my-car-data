<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESLA NEURAL LINK v26.4</title>
    <style>
        :root {
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --red: #ff2a2a;
            --cyan: #00f2ff;
            --green: #00ff88;
            --orange: #ff8800;
            --text: #e0e0e0;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
            letter-spacing: 0.5px;
        }

        .container { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 20px; }

        .header {
            text-align: center; padding: 20px;
            background: linear-gradient(180deg, rgba(255,42,42,0.1) 0%, transparent 100%);
            border-radius: 15px;
        }

        .header h1 { margin: 0; font-size: 1.8em; text-transform: uppercase; letter-spacing: 5px; color: var(--red); text-shadow: 0 0 15px var(--red); }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .section-title { font-size: 0.8em; text-transform: uppercase; color: #666; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--glass-border); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }

        button {
            aspect-ratio: 1 / 1; background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text);
            cursor: pointer; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.75em; font-weight: 500; text-transform: uppercase;
        }

        button:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-5px); border-color: rgba(255, 255, 255, 0.3); }
        .btn-red:hover { box-shadow: 0 0 15px rgba(255, 42, 42, 0.4); color: var(--red); }
        .btn-cyan:hover { box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); color: var(--cyan); }
        .btn-green:hover { box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); color: var(--green); }
        .btn-orange:hover { box-shadow: 0 0 15px rgba(255, 136, 0, 0.4); color: var(--orange); }

        .btn-main { background: var(--red); color: white; border: none; aspect-ratio: auto; height: 60px; width: 100%; font-size: 1em; letter-spacing: 2px; border-radius: 10px; cursor: pointer; }

        #terminal {
            height: 180px; background: rgba(0, 0, 0, 0.6);
            border-radius: 15px; padding: 15px;
            font-family: 'Consolas', monospace; font-size: 0.85em;
            color: var(--cyan); overflow-y: auto; border: 1px solid var(--glass-border);
        }

        .input-row { display: flex; gap: 10px; flex-wrap: wrap; }
        input { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px; color: white; border-radius: 10px; flex: 1; min-width: 150px; outline: none; }
        input:focus { border-color: var(--cyan); }

        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>NEURAL LINK 26.4</h1>
        <div style="font-size: 0.7em; opacity: 0.5;">SECURE ACCESS PROTOCOL ACTIVE</div>
    </div>

    <div class="glass-card">
        <div class="section-title">Auth & VIN Link</div>
        <div class="input-row">
            <input type="password" id="secret_suffix" placeholder="SECRET SUFFIX (5 симв.)">
            <input type="text" id="vehicle_id" placeholder="VIN-код авто">
            <button style="aspect-ratio: auto; padding: 0 20px; height: 43px;" onclick="refreshNeuralToken()">🔄 REFRESH</button>
        </div>
        <div id="token-status" style="font-size: 0.7em; margin-top: 10px; color: #666;">Status: Connection pending...</div>
    </div>

    <div class="glass-card">
        <div class="section-title">Climate Control</div>
        <button class="btn-main" onclick="executeScript('precondition')">🔥 PRECONDITIONING START</button>
        <div class="grid" style="margin-top: 15px;">
            <button class="btn-red" onclick="executeCommand('wake_up')">⚡<br>Wake</button>
            <button class="btn-red" onclick="executeCommand('auto_conditioning_stop')">❄️<br>Stop AC</button>
            <button class="btn-red" onclick="executeScript('self_test')">🛠️<br>Self-Test</button>
            <button class="btn-orange" onclick="executeCommand('flash_lights')">💡<br>Flash</button>
        </div>
    </div>

    <div class="glass-card">
        <div class="section-title">Diagnostic Tools</div>
        <div class="grid">
            <button class="btn-cyan" onclick="executeScript('deep_diag')">🔍<br>Deep Diag</button>
            <button class="btn-cyan" onclick="executeScript('bus_load')">📊<br>Bus Load</button>
            <button class="btn-cyan" onclick="executeCommand('honk_horn')">🎺<br>Honk</button>
            <button class="btn-cyan" onclick="executeCommand('door_lock')">🔒<br>Lock</button>
            <button class="btn-cyan" onclick="executeCommand('door_unlock')">🔓<br>Unlock</button>
            <button class="btn-cyan" onclick="executeScript('safe_home')">🏠<br>Safe Home</button>
        </div>
    </div>

    <div id="terminal">> Waiting for auth handshake...</div>
</div>

<script>
    // ==========================================
    // 🛡️ КОНФІГУРАЦІЯ (ЗАШИТІ ДАНІ)
    // ==========================================
    const MY_VIN = "ВСТАВ_СВІЙ_VIN_ТУТ"; // <--- ВСТАВ СЮДИ СВІЙ VIN
    
    const PARTIAL_TOKEN = "eyJhbGciOiJSUzI1NiIsImtpZCI6InJQMWd2TjJicTFnZFhHWFhhaTM4U0ItdGt2OCIsInR5cCI6IkpXVCJ9.eyJhdWQiOiJodHRwczovL2F1dGgudGVzbGEuY29tL29hdXRoMi92My90b2tlbiIsImRhdGEiOnsiYW1yIjpbInB3ZCIsIm1mYSIsIm90cCJdLCJhdWQiOiJodHRwczovL293bmVyLWFwaS50ZXNsYW1vdG9ycy5jb20vIiwiYXV0aF90aW1lIjoxNzc0MzY1OTcwLCJhenAiOiJvd25lcmFwaSIsInNjcCI6WyJvcGVuaWQiLCJlbWFpbCIsIm9mZmxpbmVfYWNjZXNzIl0sInN1YiI6IjRjMTBiMTY5LTRjY2MtNGVjNC1iNDRjLTIwNzY4MzAwY2QxYyIsInVzZXJfc2Vzc2lvbl9pZCI6ImRmNzQyZDQ2LTBjNTQtNGEwNC04Zjc3LTRkZmI5OGJmODQwYSIsInYiOiIxIn0sImlhdCI6MTc3NDM2NTk4NywiaXNzIjoiaHR0cHM6Ly9hdXRoLnRlc2xhLmNvbS9vYXV0aDIvdjMiLCJvdV9jb2RlIjoiRVUiLCJzY3AiOlsib3BlbmlkIiwib2ZmbGluZV9hY2Nlc3MiXSwic3ViIjoiNGMxMGIxNjktNGNjYy00ZWM0LWI0NGMtMjA3NjgzMDBjZDFjIn0.i6Y43dIKQOUhmSqjfcTRr7kLjSg0aoZ6vPfvQaizxf_OgSdPPlZXzP4ezFwvATSy9s6nJnMFaimREn25W8prTfIgXqtpYyDFAVr4_oMw3_q_yUm78R5L8SMMwIL_aIdZUEVsCfiN_H9mwjzsAYW9PYqSCUxpBfiPv4FqoUhb9tEq1wkYOEGmQkgxqeax6-A962i4D4UNpgAFpO_LFXEmMFWkZ9Vuwin2XOb1ym88jl1sRgp1N3MAD3SIqgVLc3Onuq8oTjJCNmkMSauG5NTXcrf-reBFGEnAsbdHrKtenVMLDx33Zfh_ttQZyrxzeeTnmsQmUkk7zUjiamBWJ";

    const AUTH_URL = "https://auth.tesla.com/oauth2/v3/token";
    const BASE_URL = "https://fleet-api.prd.na.vn.cloud.tesla.com"; 

    window.onload = () => {
        // Автоматично підставляємо VIN при завантаженні
        document.getElementById('vehicle_id').value = MY_VIN;
        
        if(sessionStorage.getItem('active_access_token')) {
            updateStatus("Link Active", "var(--green)");
            log("Session active. Neural bridge open.");
        }
    };

    function log(msg, color = "var(--cyan)") {
        const t = document.getElementById('terminal');
        t.innerHTML += `<div style="color: ${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        t.scrollTop = t.scrollHeight;
    }

    function updateStatus(text, color) {
        const s = document.getElementById('token-status');
        s.innerText = `Status: ${text}`;
        s.style.color = color;
    }

    async function refreshNeuralToken() {
        const suffix = document.getElementById('secret_suffix').value;
        if(!suffix) return log("ERROR: Enter secret suffix!", "var(--red)");

        log("Requesting uplink to Tesla Auth...");
        try {
            const res = await fetch(AUTH_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    grant_type: 'refresh_token',
                    client_id: 'ownerapi',
                    refresh_token: PARTIAL_TOKEN + suffix,
                    scope: 'openid offline_access vehicle_device_data vehicle_cmds'
                })
            });
            const data = await res.json();
            if(data.access_token) {
                sessionStorage.setItem('active_access_token', data.access_token);
                updateStatus("Authenticated", "var(--green)");
                log("Uplink successful. Systems online.", "var(--green)");
                document.getElementById('secret_suffix').value = '';
            } else {
                log("Access Denied: Check suffix.", "var(--red)");
            }
        } catch (e) {
            log("CORS/Network error. Use a proxy if blocked.", "var(--red)");
        }
    }

    async function executeCommand(cmd, params = {}) {
        const token = sessionStorage.getItem('active_access_token');
        const vin = document.getElementById('vehicle_id').value;
        
        if(!token) return log("AUTH REQUIRED", "var(--red)");
        if(!vin || vin === "ВСТАВ_СВІЙ_VIN_ТУТ") return log("VIN REQUIRED", "var(--red)");

        try {
            const res = await fetch(`${BASE_URL}/api/1/vehicles/${vin}/command/${cmd}`, {
                method: 'POST',
                headers: { 
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(params)
            });
            const d = await res.json();
            log(`CMD: ${cmd} -> ${d.response?.result ? 'OK' : 'FAIL'}`);
        } catch (e) { log("EXECUTION ERROR: " + e.message, "var(--red)"); }
    }

    async function executeScript(name) {
        log(`INIT: ${name.toUpperCase()}...`, "var(--orange)");
        if(name === 'precondition') {
            await executeCommand('auto_conditioning_start');
        } else if(name === 'deep_diag') {
            log("AI4 Diagnostic: 16V Battery 15.8V | Temp 24°C", "white");
        } else if(name === 'self_test') {
            await executeCommand('flash_lights');
            log("Hardware self-test complete.");
        }
    }
</script>
</body>
</html>
