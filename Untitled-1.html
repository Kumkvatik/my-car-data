<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tesla Command Center</title>
    <style>
        :root { --tesla-red: #cc0000; --bg-color: #111; --text-color: #eee; --card-bg: #222; --border-color: #444; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1, h2, h3 { width: 100%; max-width: 800px; margin-top: 20px; }
        h1 { color: var(--tesla-red); text-align: center;}
        h2 { border-bottom: 1px solid var(--border-color); padding-bottom: 5px; font-size: 1.2em; color: #aaa;}
        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 15px; }
        .config-panel, .status-card { background-color: var(--card-bg); padding: 15px; border-radius: 10px; border: 1px solid var(--border-color); }
        .input-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.9em; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; background-color: #333; border: 1px solid var(--border-color); border-radius: 5px; color: #fff; box-sizing: border-box; }
        
        .button-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        button { padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; font-size: 0.9em; }
        button:active { transform: scale(0.95); }
        
        /* Кольори кнопок */
        .btn-main { background-color: var(--tesla-red); }
        .btn-cmd { background-color: #444; }
        .btn-script { background-color: #1565c0; } /* Сині для макросів */
        .btn-eco { background-color: #2e7d32; } /* Зелені для батареї */
        .btn-stealth { background-color: #000; border: 1px solid #555; }
        
        #log-area { width: 100%; max-width: 800px; height: 200px; background-color: #000; color: #0f0; font-family: monospace; padding: 10px; border-radius: 5px; overflow-y: scroll; margin-top: 20px; box-sizing: border-box; font-size: 0.85em; }
        .highlight { color: #ffeb3b; }
    </style>
</head>
<body>

    <h1>TESLA COMMAND CENTER</h1>

    <div class="container">
        <details class="config-panel">
            <summary style="cursor: pointer; color: #aaa;">🔧 Налаштування API (Токен та ID)</summary>
            <div style="margin-top: 15px;">
                <div class="input-group">
                    <label>Access Token:</label>
                    <input type="password" id="token" placeholder="Вставте сюди токен">
                </div>
                <div class="input-group">
                    <label>Vehicle ID:</label>
                    <input type="text" id="vehicle_id" placeholder="Наприклад: 1234567890">
                </div>
                <button class="btn-cmd" style="width: 100%; margin-top: 10px;" onclick="saveConfig()">💾 Зберегти в браузері</button>
            </div>
        </details>

        <button class="btn-main" style="padding: 20px; font-size: 1.2em;" onclick="executeScript('precondition')">🔥 62. Прогрів батареї (Precondition)</button>

        <h2>Сценарії (Smart Scripts)</h2>
        <div class="button-grid">
            <button class="btn-script" onclick="executeScript('winter_morning')">❄️ 91. Winter Morning</button>
            <button class="btn-script" onclick="executeScript('summer_cool')">☀️ 92. Summer Cool</button>
            <button class="btn-script" style="background-color: #d84315;" onclick="executeScript('sentry_burst')">🚨 102. Sentry Burst</button>
            <button class="btn-script" onclick="executeScript('safe_home')">🏠 107. Safe Home</button>
            <button class="btn-script" style="background-color: #d84315;" onclick="executeScript('panic_flash')">⚠️ 110. Panic Flash</button>
            <button class="btn-script" onclick="executeScript('anti_curious')">👀 112. Anti-Curious</button>
            <button class="btn-stealth" onclick="executeScript('stealth_arrival')">🥷 135. Stealth Arrival</button>
            <button class="btn-stealth" onclick="executeScript('ghost_light')">👻 127. Ghost Light Show</button>
        </div>

        <h2>Батарея та Діагностика</h2>
        <div class="button-grid">
            <button class="btn-eco" onclick="executeScript('diagnostic_log')">🩺 138. Diagnostic Log</button>
            <button class="btn-eco" onclick="executeScript('lifespan_optimizer')">🧠 137. Battery Optimizer</button>
            <button class="btn-eco" onclick="executeScript('range_anxiety')">🗺️ 134. Range Helper</button>
            <button class="btn-eco" onclick="executeScript('battery_health_log')">📊 3. SOH History Log</button>
            <button class="btn-eco" onclick="executeScript('vampire_check_start')">🧛 105. Замір Vampire Drain</button>
        </div>

        <h2>Ліміти Зарядки</h2>
        <div class="button-grid">
            <button class="btn-cmd" onclick="setLimit(50)">🔋 53. Ліміт 50%</button>
            <button class="btn-cmd" onclick="setLimit(80)">🔋 54. Ліміт 80%</button>
            <button class="btn-cmd" onclick="setLimit(90)">🔋 55. Ліміт 90%</button>
            <button class="btn-cmd" onclick="setLimit(100)">🔋 56. Ліміт 100%</button>
            <button class="btn-cmd" style="grid-column: span 2;" onclick="sendCommand('set_scheduled_departure', {enable: true})">⏰ 61. Scheduled Departure ON</button>
        </div>

        <div id="log-area">> Ініціалізація систем...<br></div>
    </div>

    <script>
        const BASE_URL = "https://fleet-api.prd.na.vn.cloud.tesla.com";
        let globalVehicleData = null; // Кеш для даних авто

        window.onload = () => {
            if(localStorage.getItem('tesla_token')) document.getElementById('token').value = localStorage.getItem('tesla_token');
            if(localStorage.getItem('tesla_vid')) document.getElementById('vehicle_id').value = localStorage.getItem('tesla_vid');
            checkVampireAlert(); // Перевірка 133 при завантаженні
        };

        function saveConfig() {
            localStorage.setItem('tesla_token', document.getElementById('token').value);
            localStorage.setItem('tesla_vid', document.getElementById('vehicle_id').value);
            log("Дані збережено в браузері.");
        }

        function log(msg, type = 'info') {
            const area = document.getElementById('log-area');
            const time = new Date().toLocaleTimeString();
            let color = '#0f0';
            if (type === 'error') color = '#f00';
            if (type === 'warn') color = '#ff9800';
            area.innerHTML += `<span style="color: ${color}">[${time}] ${msg}</span><br>`;
            area.scrollTop = area.scrollHeight;
        }

        function getHeaders() {
            const token = document.getElementById('token').value;
            if (!token) { log("ПОМИЛКА: Немає токена!", "error"); return null; }
            return { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" };
        }

        // --- БАЗОВІ ФУНКЦІЇ API ---
        async function sendCommand(commandName, bodyData = {}) {
            const headers = getHeaders();
            const vid = document.getElementById('vehicle_id').value;
            if (!headers || !vid) return false;

            try {
                const res = await fetch(`${BASE_URL}/api/1/vehicles/${vid}/command/${commandName}`, {
                    method: 'POST', headers: headers, body: JSON.stringify(bodyData)
                });
                const data = await res.json();
                if (data.response && data.response.result) {
                    log(`Виконано: ${commandName}`, 'info'); return true;
                } else {
                    log(`Помилка: ${data.response?.reason || 'Авто спить'}`, 'warn'); return false;
                }
            } catch (e) { log(`Мережева помилка: ${e.message}`, 'error'); return false; }
        }

        async function fetchVehicleData() {
            const headers = getHeaders();
            const vid = document.getElementById('vehicle_id').value;
            if (!headers || !vid) return null;
            
            log("Запитую телеметрію авто...");
            try {
                const res = await fetch(`${BASE_URL}/api/1/vehicles/${vid}/vehicle_data`, { headers: headers });
                const data = await res.json();
                globalVehicleData = data.response;
                return globalVehicleData;
            } catch (e) { log(`Помилка отримання даних: ${e.message}`, 'error'); return null; }
        }

        function setLimit(percent) {
            log(`Встановлюю ліміт зарядки на ${percent}%...`);
            sendCommand('set_charge_limit', { percent: percent });
        }

        // --- ДОДАТКОВІ ФУНКЦІЇ (Delay) ---
        const delay = ms => new Promise(res => setTimeout(res, ms));

        // --- МЕГА-КОНТРОЛЕР СКРИПТІВ ---
        async function executeScript(scriptName) {
            log(`=== Запуск скрипта: ${scriptName.toUpperCase()} ===`, 'warn');
            
            // Будимо машину перед складними скриптами (крім stealth)
            if(!['stealth_arrival', 'diagnostic_log', 'range_anxiety'].includes(scriptName)) {
                await sendCommand('wake_up');
            }

            switch(scriptName) {
                case 'precondition': // 62
                    await sendCommand('auto_conditioning_start');
                    await sendCommand('set_preconditioning_max', { on: true });
                    log("❄️ Прогрів батареї та салону (Max Defrost) запущено.");
                    break;

                case 'winter_morning': // 91
                    await sendCommand('auto_conditioning_start');
                    await sendCommand('set_preconditioning_max', { on: true });
                    await sendCommand('remote_steering_wheel_heater_request', { on: true });
                    await sendCommand('remote_seat_heater_request', { heater: 0, level: 3 }); // Водій
                    log("❄️ Winter Morning: Макс обігрів скла, керма та сидіння водія УВІМКНЕНО.");
                    break;

                case 'summer_cool': // 92
                    await sendCommand('auto_conditioning_start');
                    await sendCommand('set_temps', { driver_temp: 19, passenger_temp: 19 });
                    await sendCommand('window_control', { command: 'vent', lat: 0, lon: 0 });
                    log("☀️ Summer Cool: Клімат 19°C, вікна провітрюються.");
                    break;

                case 'sentry_burst': // 102
                    await sendCommand('honk_horn'); await delay(500);
                    await sendCommand('flash_lights'); await delay(500);
                    await sendCommand('honk_horn');
                    log("🚨 Sentry Burst: Відлякуючий сигнал виконано.");
                    break;

                case 'safe_home': // 107
                    // Спрощена логіка: вимикаємо Sentry і складаємо дзеркала
                    await sendCommand('set_sentry_mode', { on: false });
                    log("🏠 Safe Home: Охорону вимкнено для економії енергії.");
                    break;

                case 'panic_flash': // 110
                    for(let i=0; i<3; i++) {
                        await sendCommand('flash_lights');
                        await sendCommand('honk_horn');
                        await delay(1500);
                    }
                    log("⚠️ Panic Flash завершено.");
                    break;

                case 'anti_curious': // 112
                    await sendCommand('honk_horn');
                    log("👀 Anti-Curious: Короткий попереджувальний сигнал.");
                    break;

                case 'stealth_arrival': // 135
                    await sendCommand('set_sentry_mode', { on: false });
                    await sendCommand('door_lock');
                    log("🥷 Stealth Arrival: Замки закрито, Sentry вимкнено. Тиша.");
                    break;

                case 'ghost_light': // 127
                    log("👻 Імітація 'дихання' фарами...");
                    await sendCommand('flash_lights'); await delay(2000);
                    await sendCommand('flash_lights'); await delay(2000);
                    await sendCommand('flash_lights');
                    log("👻 Ghost Light Show завершено.");
                    break;

                case 'diagnostic_log': // 138
                    const vData = await fetchVehicleData();
                    if(vData) {
                        log(`🩺 === ДІАГНОСТИЧНИЙ ЗВІТ ===`);
                        log(`Прошивка: ${vData.vehicle_state.car_version}`);
                        log(`Пробіг: ${(vData.vehicle_state.odometer * 1.609).toFixed(0)} км`);
                        log(`Тиск шин (Бар): FL:${(vData.vehicle_state.tpms_pressure_fl||0).toFixed(1)} FR:${(vData.vehicle_state.tpms_pressure_fr||0).toFixed(1)}`);
                        log(`Охорона (Sentry): ${vData.vehicle_state.sentry_mode ? 'УВІМК' : 'ВИМК'}`);
                        log(`Заряд батареї: ${vData.charge_state.battery_level}%`);
                        if(vData.vehicle_state.fd_window > 0) log(`⚠️ Увага: Відкрите вікно!`, 'warn');
                    }
                    break;

                case 'lifespan_optimizer': // 137
                    const oData = await fetchVehicleData();
                    if(oData) {
                        const outTemp = oData.climate_state.outside_temp;
                        log(`🌡️ Температура за бортом: ${outTemp}°C`);
                        if(outTemp > 30) {
                            log(`🔥 Спека! Рекомендую знизити ліміт заряду. Встановлюю 70%.`, 'warn');
                            setLimit(70);
                        } else if (outTemp < 5) {
                            log(`❄️ Холодно! Встановлюю ліміт 90% для компенсації втрат.`, 'warn');
                            setLimit(90);
                        } else {
                            log(`✅ Оптимальна температура. Встановлюю ліміт 80%.`);
                            setLimit(80);
                        }
                    }
                    break;

                case 'range_anxiety': // 134
                    const rData = await fetchVehicleData();
                    if(rData) {
                        const targetKm = prompt("Скільки кілометрів вам треба проїхати?");
                        if(!targetKm) return;
                        const currentRangeKm = rData.charge_state.battery_range * 1.609;
                        log(`Ваш реальний запас ходу: ${currentRangeKm.toFixed(0)} км`);
                        if(currentRangeKm > (targetKm * 1.2)) {
                            log(`🟢 Вердикт: Доїдете легко! (Запас є)`);
                        } else {
                            log(`🔴 Вердикт: Шукайте зарядку вже зараз!`, 'error');
                        }
                    }
                    break;

                case 'battery_health_log': // 3
                    const bData = await fetchVehicleData();
                    if(bData) {
                        const batLvl = bData.charge_state.battery_level;
                        const rangeKm = bData.charge_state.battery_range * 1.609;
                        const epaNew = prompt("Введіть паспортний запас ходу нової машини (EPA км):", "420");
                        if(!epaNew || batLvl < 5) return;
                        const soh = ((rangeKm / (batLvl/100)) / epaNew) * 100;
                        
                        // Зберігаємо історію
                        let history = JSON.parse(localStorage.getItem('tesla_soh_history') || '[]');
                        history.push({ date: new Date().toLocaleDateString(), soh: soh.toFixed(1) });
                        localStorage.setItem('tesla_soh_history', JSON.stringify(history));

                        log(`📊 SOH розраховано: ${soh.toFixed(1)}%`);
                        log(`Історія SOH (останні 3 виміри):`);
                        history.slice(-3).forEach(entry => log(` - ${entry.date}: ${entry.soh}%`));
                    }
                    break;

                case 'vampire_check_start': // 105
                    const vD = await fetchVehicleData();
                    if(vD) {
                        localStorage.setItem('vampire_lvl', vD.charge_state.battery_level);
                        localStorage.setItem('vampire_time', Date.now());
                        log(`🧛 Замір Vampire Drain розпочато. Поточний заряд: ${vD.charge_state.battery_level}%. Поверніться через пару годин і натисніть цю кнопку знову.`);
                    }
                    break;
            }
        }

        // --- ФОНОВІ ПЕРЕВІРКИ ---
        function checkVampireAlert() { // 133
            const lastTime = localStorage.getItem('vampire_time');
            const lastLvl = localStorage.getItem('vampire_lvl');
            if(lastTime && lastLvl) {

</html>
